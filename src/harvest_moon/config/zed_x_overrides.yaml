/**:
    ros__parameters:
        general:
            # MUST be a SDK-supported native rate at this resolution
            # (HD1200: 15, 30, 60). Setting an unsupported value (e.g. 5
            # or 10) makes the SDK reject startup and the ZED node fails
            # to launch.
            # In slave mode the Teensy trigger period dictates actual
            # capture rate regardless of this value. Production: Teensy
            # fires at 5 Hz (200 ms period), and the SDK keeps up fine
            # with 5 Hz captures even though it's configured for 15 Hz.
            grab_frame_rate: 15
            # Publish at the camera's native grab resolution (HD1200,
            # 1920×1200 for ZED X). Default is 'CUSTOM' with a 2× downscale
            # factor, which would publish at 960×600 — wastes the sensor's
            # full resolution. ~4× bandwidth cost on every published image
            # stream, but worth it for data-collection quality.
            pub_resolution: 'NATIVE'
        video:
            # Disable auto-exposure and use a short fixed exposure so the LHI-DO
            # strobe (which fires for ~500 µs during each Basler exposure) is
            # the dominant light source in ZED frames. With auto-exposure on,
            # the wrapper picks a long exposure that washes out the strobe.
            auto_exposure_gain: false
            exposure_time: 200   # µs; small enough that strobe contribution dominates
        depth:
            # ULTRA = highest-fidelity classical stereo depth (no TensorRT
            # models needed, unlike the NEURAL_* modes). Enables the
            # /depth/depth_registered, /point_cloud/cloud_registered,
            # /confidence/confidence_map, and /disparity/disparity_image
            # topics. Set to 'NONE' to disable depth entirely (saves ~250
            # MB/s of bag bandwidth and CPU; needed if the container's ZED
            # SDK is missing the TensorRT models AND a NEURAL_* mode was
            # previously selected).
            depth_mode: 'ULTRA'
            # Pointcloud publish rate (default in common_stereo.yaml is 10.0).
            # Bump to 15 to match the camera grab rate so every depth frame
            # has a corresponding pointcloud frame in the dataset.
            point_cloud_freq: 15.0
        object_detection:
            od_enabled: false
        body_tracking:
            bt_enabled: false

