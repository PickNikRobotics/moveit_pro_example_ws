#
#  This contains information for a unique instance of a robot.
#

# Name of the package to specialize
based_on_package: "mobile_fr3_duo_base_config"
hardware:
  # Parameters used to configure the robot description through XACRO.
  # A URDF and SRDF are both required.
  # [Required]
  robot_description:
    urdf:
      package: "mobile_fr3_duo_sim_config"
      path: "description/mobile_fr3_duo.xacro"
    srdf:
      package: "mobile_fr3_duo_sim_config"
      path: "config/moveit/mobile_fr3_duo.srdf"
    # Specify any additional parameters required for the URDF.
    # These are passed as xacro arguments to mobile_fr3_duo.xacro.
    # [Optional]
    urdf_params:
      - robot_types: "['tmrv0_2','fr3v2','fr3v2']"
      - no_prefix: "false"
      - hand: "true"
      - ee_id: "franka_hand"
      - special_connection: ""
      - xyz_ee: "0 0 0"
      - rpy_ee: "0 0 -0.7854"
      - tcp_xyz: "0 0 0.1034"
      - tcp_rpy: "0 0 0"
      - safety_distance: "0.03"
      - with_sc: "false"
      - robot_ips: "['172.16.0.1','172.16.0.2','172.16.0.3']"
      - fake_sensor_commands: "false"
      - gazebo: "false"
      - gazebo_effort: "false"
      - mujoco_viewer: "true"  # set to true locally to open the MuJoCo viewer window; true contends with the offscreen EGL camera render thread (eglMakeCurrent EGL_NOT_INITIALIZED)
      - description_pkg: "franka_description"
      - is_async: "false"
      - thread_priority: "50"
      - reduced_version: "false"
      - mujoco_model: "description/scene_navigation.xml" # To use navigation sensors, change this to "description/scene_navigation.xml"

  # Additional sim-only nodes (cmd_vel QoS relay + world->odom static TF).
  # Brought up automatically by the MoveIt Pro agent when hardware.simulated is true.
  # simulated_robot_driver_persist_launch_file:
  #   package: "mobile_fr3_duo_sim_config"
  #   path: "launch/sim/robot_drivers_to_persist_sim.launch.py"

moveit_params:
  # Spine-free combined-arm group (14 joints). The arm controllers were decoupled from the
  # spine (joint_trajectory_admittance_controller claims manipulator_without_spine; the spine
  # is commanded separately by spine_controller), so the default planning group must exclude
  # franka_spine_vertical_joint — otherwise teleop/Move-to-Waypoint emits a 15-joint trajectory
  # that the 14-joint controller rejects ("specifies 15 joints, but controller only has 14").
  joint_group_name: "manipulator_without_spine"

  kinematics:
    package: "mobile_fr3_duo_sim_config"
    path: "config/moveit/pose_ik_distance.yaml"
  sensors_3d:
    package: "mobile_fr3_duo_sim_config"
    path: "config/moveit/sensors_3d.yaml"
  joint_limits:
    package: "mobile_fr3_duo_sim_config"
    path: "config/moveit/joint_limits.yaml"
  pose_jog:
    package: "mobile_fr3_duo_sim_config"
    path: "config/moveit/pose_jog.yaml"
  joint_jog:
    package: "mobile_fr3_duo_sim_config"
    path: "config/moveit/joint_jog.yaml"

  publish:
    planning_scene: True
    geometry_updates: True
    state_updates: True
    transforms_updates: True

  trajectory_execution:
    manage_controllers: True
    allowed_execution_duration_scaling: 2.0
    allowed_goal_duration_margin: 5.0
    allowed_start_tolerance: 0.01

# Configuration for loading behaviors and objectives.
# [Required]
objectives:
  # List of plugins for loading custom behaviors.
  # [Required]
  behavior_loader_plugins:
    # This plugin will load the core MoveIt Pro Behaviors.
    # Add additional plugin loaders as needed.
    core:
      - "moveit_pro::behaviors::CoreBehaviorsLoader"
      - "moveit_pro::behaviors::MTCCoreBehaviorsLoader"
      - "moveit_pro::behaviors::NavBehaviorsLoader"
      - "moveit_pro::behaviors::VisionBehaviorsLoader"
      - "moveit_pro::behaviors::ConverterBehaviorsLoader"
      - "moveit_pro::behaviors::MujocoBehaviorsLoader"
  # Specify source folder for objectives
  # [Required]
  objective_library_paths:
    sim_objectives:
      package_name: "mobile_fr3_duo_sim_config"
      relative_path: "objectives"
  # Specify the location of the saved waypoints file.
  # [Required]
  waypoints_file:
    package_name: "mobile_fr3_duo_sim_config"
    relative_path: "waypoints/waypoints.yaml"

# Configuration for launching ros2_control processes.
# [Required, if using ros2_control]
ros2_control:
  config:
    package: "mobile_fr3_duo_sim_config"
    path: "config/control/franka_ros2_control.yaml"
  # MoveIt Pro will load and activate these controllers at start up to ensure they are available.
  # If not specified, it is up to the user to ensure the appropriate controllers are active and available
  # for running the application.
  # [Optional, default=[]]
  controllers_active_at_startup:
    - "joint_state_broadcaster"
    - "left_gripper_controller"
    - "right_gripper_controller"
    # - "left_joint_trajectory_controller"
    # Dedicated spine controller — sole owner of franka_spine_vertical_joint/position.
    # Must be active so spine-only trajectories can be commanded before arm motion.
    - "spine_controller"
    - "left_joint_trajectory_admittance_controller"
    - "left_fingertip_attach_mechanism"
    - "right_fingertip_attach_mechanism"
    - "left_force_torque_sensor_broadcaster"
    - "right_force_torque_sensor_broadcaster"
    # TODO: when whole-body motion / teleop is reintroduced, add a second mecanum
    # controller (e.g. `platform_velocity_controller` with body_frame_control: false)
    # and swap it with `platform_velocity_controller_nav2` via SwitchController.
    - "platform_velocity_controller_nav2"
    - "imu_sensor_broadcaster"
  # Load but do not start these controllers so they can be activated later if needed.
  controllers_inactive_at_startup:
    - "left_joint_trajectory_controller"
    - "right_joint_trajectory_admittance_controller"
    - "right_velocity_force_controller"
    - "left_velocity_force_controller"
    - "joint_trajectory_admittance_controller"
  # Any controllers here will not be spawned by MoveIt Pro.
  # [Optional, default=[]]
  controllers_not_managed: []
  # Optionally configure remapping rules to let multiple controllers receive commands on the same topic.
  # [Optional, default=[]]
  controller_shared_topics: []
