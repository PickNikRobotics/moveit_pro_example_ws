# Insertion-specific admittance tuning (hard drive into server rack).
#
# Admittance control oscillates on contact with a STIFF environment (the rack
# walls + stiff MuJoCo contacts). The cure is the opposite of impedance
# intuition: heavier virtual mass, softer virtual stiffness, and strong joint
# damping. The shared admittance_params.yaml (mass 20 / stiffness 20-100) kept
# oscillating; this file pushes the stabilizing levers hard.
#   - mass 80    : sluggish/heavy EE that ignores contact-force spikes (primary fix)
#   - stiffness 20 : soft, so small contact forces don't trigger large corrective motion
#   - damping_ratio 2.0 : mildly overdamped, no overshoot
#   - joint_damping 10  : directly damps joint velocities, killing arm-level oscillation
# selected_axes unchanged: x/y lateral compliant for self-alignment, z (insertion
# axis) position-controlled.
SetAdmittanceParameters:
  control_frame: left_grasp_link
  controller_name: ''
  end_effector_frame: left_grasp_link
  admittance:
    selected_axes:
      x: true
      y: true
      z: false
      rx: false
      ry: false
      rz: false
    mass_position:
      max: 200
      min: 0.001
      x: 80
      y: 80
      z: 80
    mass_rotation:
      max: 200
      min: 0.001
      x: 80
      y: 80
      z: 80
    stiffness_position:
      max: 1000
      min: 0
      x: 20
      y: 20
      z: 20
    stiffness_rotation:
      max: 1000
      min: 0
      x: 20
      y: 20
      z: 20
    damping_ratio_position:
      max: 100
      min: 0
      x: 2.0
      y: 2.0
      z: 2.0
    damping_ratio_rotation:
      max: 100
      min: 0
      x: 2.0
      y: 2.0
      z: 2.0
    joint_damping:
      max: 100
      min: 0
      value: 10
